<!DOCTYPE html>
<html class="light" lang="en">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
  <title>Hu Wenguang Arch - Puzzle Overlay</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "inverse-on-surface": "#f2f0ee",
            "on-tertiary": "#ffffff",
            "background": "#faf9f7",
            "on-background": "#1b1c1b",
            "surface-container-high": "#e9e8e6",
            "tertiary-container": "#906b6d",
            "surface": "#faf9f7",
            "surface-tint": "#4c6456",
            "surface-container": "#efeeeb",
            "on-primary-container": "#f5fff7",
            "primary-container": "#627a6c",
            "on-error-container": "#93000a",
            "surface-variant": "#e3e2e0",
            "surface-container-low": "#f5f3f1",
            "inverse-primary": "#b3cdbd",
            "tertiary-fixed": "#ffdadb",
            "on-secondary": "#ffffff",
            "tertiary": "#755355",
            "secondary-fixed-dim": "#e0c38d",
            "error": "#ba1a1a",
            "surface-dim": "#dbdad8",
            "outline": "#727974",
            "on-error": "#ffffff",
            "inverse-surface": "#30312f",
            "secondary": "#715b2f",
            "on-tertiary-container": "#fffbff",
            "on-primary-fixed-variant": "#354c3f",
            "on-tertiary-fixed": "#2d1417",
            "on-secondary-fixed-variant": "#58441a",
            "outline-variant": "#c2c8c2",
            "primary-fixed": "#cfe9d8",
            "on-secondary-fixed": "#261900",
            "primary": "#4a6154",
            "surface-bright": "#faf9f7",
            "on-tertiary-fixed-variant": "#5e3e41",
            "tertiary-fixed-dim": "#e7bcbe",
            "secondary-container": "#fbdca4",
            "on-surface-variant": "#424844",
            "on-primary": "#ffffff",
            "surface-container-highest": "#e3e2e0",
            "on-surface": "#1b1c1b",
            "on-secondary-container": "#765f33",
            "error-container": "#ffdad6",
            "primary-fixed-dim": "#b3cdbd",
            "on-primary-fixed": "#092016",
            "surface-container-lowest": "#ffffff",
            "secondary-fixed": "#fedea7"
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px"
          },
          spacing: {
            gutter: "24px",
            unit: "4px",
            "asymmetric-offset": "64px",
            "container-max": "1440px",
            margin: "48px"
          },
          fontFamily: {
            "body-lg": ["Inter"],
            "technical-xs": ["JetBrains Mono"],
            h1: ["Noto Serif SC"],
            h3: ["Noto Serif SC"],
            "technical-sm": ["JetBrains Mono"],
            h2: ["Noto Serif SC"],
            "body-md": ["Inter"]
          },
          fontSize: {
            "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
            "technical-xs": ["12px", {"lineHeight": "1.2", "fontWeight": "500"}],
            h1: ["48px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700"}],
            h3: ["24px", {"lineHeight": "1.4", "fontWeight": "500"}],
            "technical-sm": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "400"}],
            h2: ["32px", {"lineHeight": "1.3", "fontWeight": "600"}],
            "body-md": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}]
          }
        }
      }
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background text-on-background min-h-screen relative overflow-hidden flex flex-col">
  <!-- Top Navigation Anchor -->
  <header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-4 h-12 bg-background/80 border-b-[1px] border-on-background">
    <span class="material-symbols-outlined text-on-background">location_on</span>
    <h1 class="font-h3 text-h3 text-on-background">ARCHIVE_XIDI_001</h1>
    <span class="material-symbols-outlined text-on-background">schedule</span>
  </header>

  <!-- Main Content Canvas (Background Map Simulation) -->
  <main class="flex-grow w-full h-full relative pt-12">
    <div class="absolute inset-0 bg-surface-container bg-cover bg-center" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCwR7g0q2Y7dkpRtc94Sf-E1MUQpkjY2zyQxVuV1MCjNJdjZziDdRv1xtNfc0JjCf6PkgRBwlaEB-BC48uspbVswpcZrtG1yyZwjLYJRLkkpYxpCyRl7AUDgHrDsm8IIPL1v0fI5GVlWZozKKgm9rL2uTGgXdEQ1IkBZd-n5oHk7AM6RBqgUuXikR6p8VOpEz61rzHDe3gy-KELYWtTsqZfhBpxJOALZeQAu2Iue3cyXB3X3OgXoJTcHskcEbwC1zOs96Sou-vmARp8');">
      <div class="absolute inset-0 bg-background/30 mix-blend-multiply"></div>
    </div>
  </main>

  <!-- Full Screen Overlay -->
  <div class="fixed inset-0 z-50 flex flex-col pt-12 bg-[#F4EFE6]/90 backdrop-blur-sm border-[1px] border-on-background m-4 md:m-margin overflow-y-auto">
    <!-- Header Metadata Tab -->
    <div class="absolute top-0 left-0 border-b-[1px] border-r-[1px] border-on-background bg-background px-4 py-2">
      <span class="font-technical-xs text-technical-xs text-on-background">SEQ_001_ARCH</span>
    </div>
    <!-- Close Button -->
    <button onclick="location.href='map.html'" class="absolute top-0 right-0 border-b-[1px] border-l-[1px] border-on-background bg-background p-2 hover:bg-on-background hover:text-background transition-colors">
      <span class="material-symbols-outlined">close</span>
    </button>

    <div class="flex flex-col h-full mt-12 max-w-3xl mx-auto w-full px-4 sm:px-gutter pb-gutter">
      <!-- Top Half: Illustration -->
      <div class="flex-shrink-0 w-full aspect-video border-[1px] border-on-background mb-gutter relative overflow-hidden bg-surface-container">
        <img alt="Close-up of intricate ancient Chinese stone carvings on a traditional archway, showing lions and auspicious clouds in high contrast brutalist lighting" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCX1JnwEWIFoK_Gsawc8MJBq-_6z1855zK75q7liRgj4T4bXzu0-q9_WIWmIzMxg6COo7xsTTVofmQ27tRth8aFROEY1c3Ms5bLknsyy_DLy-4Mrz5pIQsHj0JdTwAVSALzLy8FXobH9f-aMlWaiaSh_SSeqVXzH22llLDcxYkcazRSCFwUTSw0nfT3AHl34jdTmmsr7othhx_kLRZQ9qOsuF2eKWO9C92CNtbZGXm_ek56-BdBtGrUZLCk_tGgBMAZQpz0XChD2SyB"/>
        <div class="absolute bottom-0 left-0 bg-background border-t-[1px] border-r-[1px] border-on-background px-3 py-1">
          <span class="font-technical-xs text-technical-xs">FIG_01: HU_WENGUANG_ARCH</span>
        </div>
      </div>

      <!-- Middle Section: Dialog Box -->
      <div class="border-[1px] border-on-background bg-background p-gutter mb-gutter relative flex flex-col sm:flex-row gap-gutter">
        <!-- Decorative Corner Lines -->
        <div class="absolute top-0 left-0 w-4 h-4 border-t-[2px] border-l-[2px] border-primary -translate-x-[1px] -translate-y-[1px]"></div>
        <div class="absolute bottom-0 right-0 w-4 h-4 border-b-[2px] border-r-[2px] border-primary translate-x-[1px] translate-y-[1px]"></div>
        <!-- Portrait -->
        <div class="flex-shrink-0 w-24 h-24 border-[1px] border-on-background flex flex-col items-center justify-center bg-surface-container relative">
          <span class="material-symbols-outlined text-4xl text-on-background">account_box</span>
          <span class="font-technical-xs text-[10px] mt-1 border-t-[1px] border-on-background w-full text-center pt-1">HU MASTER</span>
        </div>
        <!-- Text -->
        <div class="flex-grow flex flex-col justify-center">
          <p class="font-h3 text-h3 text-on-background leading-relaxed">
            明经胡氏，牌坊不朽。请君补全此坊之名：
          </p>
        </div>
      </div>

      <!-- Bottom Section: Interactive Puzzle -->
      <div class="flex-grow flex flex-col justify-center items-center py-gutter mb-gutter border-t-[1px] border-b-[1px] border-on-background border-dashed">
        <div class="flex flex-wrap justify-center items-center gap-4 sm:gap-6">
          <!-- Input 1 -->
          <div class="relative group">
            <input class="w-16 h-16 sm:w-20 sm:h-20 bg-transparent border-0 border-b-[1px] border-on-background text-center font-h2 text-h2 focus:ring-0 focus:border-primary focus:border-b-[2px] transition-colors" maxlength="1" placeholder=" " type="text"/>
            <span class="absolute top-0 right-0 font-technical-xs text-[10px] text-on-surface-variant opacity-0 group-focus-within:opacity-100">01</span>
          </div>
          <span class="font-h2 text-h2 text-on-background">柱</span>
          <!-- Input 2 -->
          <div class="relative group">
            <input class="w-16 h-16 sm:w-20 sm:h-20 bg-transparent border-0 border-b-[1px] border-on-background text-center font-h2 text-h2 focus:ring-0 focus:border-primary focus:border-b-[2px] transition-colors" maxlength="1" placeholder=" " type="text"/>
            <span class="absolute top-0 right-0 font-technical-xs text-[10px] text-on-surface-variant opacity-0 group-focus-within:opacity-100">02</span>
          </div>
          <span class="font-h2 text-h2 text-on-background">间</span>
          <!-- Input 3 -->
          <div class="relative group">
            <input class="w-16 h-16 sm:w-20 sm:h-20 bg-transparent border-0 border-b-[1px] border-on-background text-center font-h2 text-h2 focus:ring-0 focus:border-primary focus:border-b-[2px] transition-colors" maxlength="1" placeholder=" " type="text"/>
            <span class="absolute top-0 right-0 font-technical-xs text-[10px] text-on-surface-variant opacity-0 group-focus-within:opacity-100">03</span>
          </div>
          <span class="font-h2 text-h2 text-on-background">楼</span>
        </div>
      </div>

      <!-- Submit Button -->
      <div class="flex justify-end w-full">
        <button class="border-[1px] border-on-background px-8 py-4 font-technical-sm text-technical-sm text-on-background bg-transparent hover:bg-on-background hover:text-background transition-colors group flex items-center gap-2">
          SUBMIT_QUERY
          <span class="material-symbols-outlined text-sm group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </button>
      </div>

      <!-- Seal Decoration -->
      <div class="absolute bottom-4 left-4 border-double border-4 border-error p-1 opacity-70">
        <div class="font-h1 text-error text-xl leading-none" style="writing-mode: vertical-rl;">胡印</div>
      </div>
    </div>
  </div>
</body>
</html>
